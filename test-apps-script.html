<!DOCTYPE html>
<html>
<head>
    <title>Test Google Apps Script</title>
</head>
<body>
    <h1>Test Google Apps Script Connection</h1>
    
    <form id="testForm">
        <input type="text" name="fullName" value="Test User" required><br><br>
        <input type="email" name="email" value="test@example.com" required><br><br>
        <input type="text" name="phone" value="9876543210" required><br><br>
        <select name="course" required>
            <option value="upsc-foundation">UPSC Foundation</option>
        </select><br><br>
        <button type="submit">Test Submit</button>
    </form>

    <div id="result"></div>

    <script>
        document.getElementById('testForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            const data = Object.fromEntries(formData);
            
            console.log('Sending data:', data);
            
            try {
                const response = await fetch('https://script.google.com/macros/s/AKfycbzwd9ou6zfRG5-HVvNWBVM9uaGlySyhvmWNa3JqsfvhMQ3jlIzUrogLjctSdXMp1S1P/exec', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: new URLSearchParams(data),
                    mode: 'no-cors'
                });
                
                document.getElementById('result').innerHTML = '<p style="color: green;">Request sent! Check your Google Sheet to see if data was added.</p>';
                console.log('Request completed');
                
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('result').innerHTML = '<p style="color: red;">Error: ' + error.message + '</p>';
            }
        });
    </script>
</body>
</html>
